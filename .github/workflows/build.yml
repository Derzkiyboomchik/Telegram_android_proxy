name: Build APK

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Android project
        uses: actions/checkout@v4

      - name: Checkout Go proxy repo
        uses: actions/checkout@v4
        with:
          repository: spatiumstas/tg-ws-proxy-go
          path: tg-ws-proxy-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build Go binaries
        run: |
          cd tg-ws-proxy-go/src
          mkdir -p ../../app/src/main/assets/bin
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../app/src/main/assets/bin/arm64-v8a/tg-ws-proxy .
          GOOS=android GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../app/src/main/assets/bin/x86_64/tg-ws-proxy .
          GOOS=android GOARCH=386 CGO_ENABLED=0 go build -ldflags="-s -w" -o ../../app/src/main/assets/bin/x86/tg-ws-proxy .

      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: app/src/main/assets/bin/

  build-apk:
    needs: build-go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: app/src/main/assets/bin/

      - name: Make binaries executable
        run: chmod -R +x app/src/main/assets/bin/*

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
